server:
  port: 8080

spring:
  application:
    name: gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/salesanalyzer
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration-ms: 86400000
  upload:
    tmp-dir: /tmp/salesanalyzer
  orchestrator:
    base-url: http://localhost:8081
  forecaster:
    base-url: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

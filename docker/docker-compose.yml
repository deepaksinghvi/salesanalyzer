services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: salesanalyzer-postgres
    environment:
      POSTGRES_DB: salesanalyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Temporal Server (all-in-one dev mode) ────────────────────
  temporal:
    image: temporalio/auto-setup:1.25.2
    container_name: salesanalyzer-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/docker.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Temporal Web UI ───────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: salesanalyzer-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8088:8080"
    depends_on:
      - temporal

  # ── Gateway Service ───────────────────────────────────────────
  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: salesanalyzer-gateway
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/salesanalyzer
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_ORCHESTRATOR_BASE_URL: http://orchestrator:8081
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Orchestrator Service ──────────────────────────────────────
  orchestrator:
    build:
      context: ../orchestrator
      dockerfile: Dockerfile
    container_name: salesanalyzer-orchestrator
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/salesanalyzer
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      TEMPORAL_CONNECTION_TARGET: temporal:7233
      APP_FORECASTER_BASE_URL: http://forecaster:8082
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started

  # ── Forecaster Service ────────────────────────────────────────
  forecaster:
    build:
      context: ../forecaster
      dockerfile: Dockerfile
    container_name: salesanalyzer-forecaster
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/salesanalyzer
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy

  # ── React UI ──────────────────────────────────────────────────
  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: salesanalyzer-ui
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  postgres_data:

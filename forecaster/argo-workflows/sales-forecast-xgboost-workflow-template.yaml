apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: sales-forecast-xgboost-workflow
  namespace: argo
spec:
  entrypoint: forecast-pipeline
  serviceAccountName: argo-workflow-sa
  arguments:
    parameters:
      - name: tenant-id
        value: ""
      - name: db-url
        value: "postgresql://postgres:postgres@host.minikube.internal:5432/salesanalyzer"
      - name: forecast-horizon-days
        value: "30"

  templates:
    - name: forecast-pipeline
      dag:
        tasks:
          - name: extract-actuals
            template: extract-data
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
          - name: run-forecast
            template: run-xgboost-forecast
            dependencies: [extract-actuals]
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
                - name: actuals-b64
                  value: "{{tasks.extract-actuals.outputs.parameters.actuals-b64}}"
          - name: write-results
            template: write-forecast-results
            dependencies: [run-forecast]
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
                - name: forecast-b64
                  value: "{{tasks.run-forecast.outputs.parameters.forecast-b64}}"
          - name: refresh-mv
            template: refresh-materialized-view
            dependencies: [write-results]

    - name: extract-data
      inputs:
        parameters:
          - name: tenant-id
      outputs:
        parameters:
          - name: actuals-b64
            valueFrom:
              path: /tmp/actuals-b64.txt
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            pip install -q psycopg2-binary
            cat > /tmp/extract.py << 'PYEOF'
            import psycopg2, csv, os, base64, io
            tenant_id = os.environ['TENANT_ID']
            db_url = os.environ['DB_URL']
            conn = psycopg2.connect(db_url)
            cursor = conn.cursor()
            cursor.execute(
                'SELECT transaction_date, category_id, location_id, amount, units_sold '
                'FROM fact_sales_daily '
                'WHERE tenant_id = %s AND is_forecast = false '
                'ORDER BY transaction_date ASC',
                (tenant_id,)
            )
            buf = io.StringIO()
            writer = csv.writer(buf)
            writer.writerow(['ds', 'category_id', 'location_id', 'y', 'units_sold'])
            for row in cursor.fetchall():
                writer.writerow(row)
            conn.close()
            encoded = base64.b64encode(buf.getvalue().encode()).decode()
            with open('/tmp/actuals-b64.txt', 'w') as f:
                f.write(encoded)
            print(f'Extracted and encoded actuals')
            PYEOF
            TENANT_ID="{{inputs.parameters.tenant-id}}" python /tmp/extract.py
        env:
          - name: DB_URL
            value: "{{workflow.parameters.db-url}}"

    - name: run-xgboost-forecast
      inputs:
        parameters:
          - name: tenant-id
          - name: actuals-b64
      outputs:
        parameters:
          - name: forecast-b64
            valueFrom:
              path: /tmp/forecast-b64.txt
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            pip install -q xgboost pandas numpy scikit-learn
            cat > /tmp/run_forecast.py << 'PYEOF'
            import pandas as pd, numpy as np, base64, io, os
            from xgboost import XGBRegressor

            horizon = int(os.environ['HORIZON'])
            actuals_b64 = os.environ['ACTUALS_B64']
            csv_data = base64.b64decode(actuals_b64.encode()).decode()
            df = pd.read_csv(io.StringIO(csv_data))
            df['ds'] = pd.to_datetime(df['ds'])

            # Aggregate to daily totals per category (locations are sparse)
            df_cat = df.groupby(['category_id', 'ds']).agg(
                y=('y', 'sum'), units_sold=('units_sold', 'sum')
            ).reset_index()
            global_max_date = df_cat['ds'].max()

            # Compute location share of revenue per category from actuals
            loc_shares = df.groupby(['category_id', 'location_id'])['y'].sum().reset_index()
            cat_totals = loc_shares.groupby('category_id')['y'].sum().reset_index().rename(columns={'y': 'cat_total'})
            loc_shares = loc_shares.merge(cat_totals, on='category_id')
            loc_shares['share'] = loc_shares['y'] / loc_shares['cat_total']

            def build_features(series_df):
                """Build time-based and lag features for XGBoost from a daily time series."""
                d = series_df.copy().sort_values('ds').reset_index(drop=True)
                d['day_of_week'] = d['ds'].dt.dayofweek
                d['day_of_month'] = d['ds'].dt.day
                d['month'] = d['ds'].dt.month
                d['week_of_year'] = d['ds'].dt.isocalendar().week.astype(int)
                # Ordinal day (days since first date) to capture trend
                d['day_ordinal'] = (d['ds'] - d['ds'].min()).dt.days
                # Lag features — use available lags, fill missing with column mean
                for lag in [1, 7, 14, 30]:
                    d[f'lag_{lag}'] = d['y'].shift(lag)
                # Rolling window stats
                for win in [7, 14, 30]:
                    d[f'roll_mean_{win}'] = d['y'].shift(1).rolling(window=win, min_periods=1).mean()
                    d[f'roll_std_{win}'] = d['y'].shift(1).rolling(window=win, min_periods=1).std().fillna(0)
                return d

            FEATURE_COLS = [
                'day_of_week', 'day_of_month', 'month', 'week_of_year', 'day_ordinal',
                'lag_1', 'lag_7', 'lag_14', 'lag_30',
                'roll_mean_7', 'roll_std_7', 'roll_mean_14', 'roll_std_14',
                'roll_mean_30', 'roll_std_30',
            ]

            results = []
            for cat, group in df_cat.groupby('category_id'):
                if len(group) < 5:
                    continue

                featured = build_features(group)
                # Drop rows where lag features are NaN (initial rows)
                train = featured.dropna(subset=['lag_1']).copy()
                if len(train) < 3:
                    continue

                X_train = train[FEATURE_COLS].values
                y_train = train['y'].values

                model = XGBRegressor(
                    n_estimators=200,
                    max_depth=4,
                    learning_rate=0.1,
                    subsample=0.8,
                    colsample_bytree=0.8,
                    objective='reg:squarederror',
                    verbosity=0,
                )
                model.fit(X_train, y_train)

                # Iterative forecasting: predict one day at a time, feed back into features
                last_known = featured.copy()
                predictions = []
                for step in range(horizon):
                    next_date = global_max_date + pd.Timedelta(days=step + 1)
                    new_row = pd.DataFrame({'ds': [next_date], 'y': [np.nan], 'units_sold': [0]})
                    last_known = pd.concat([last_known, new_row], ignore_index=True)
                    last_known = build_features(last_known[['ds', 'y', 'units_sold']])
                    row_feat = last_known.iloc[-1:]
                    X_pred = row_feat[FEATURE_COLS].fillna(0).values
                    pred = float(model.predict(X_pred)[0])
                    pred = max(0, pred)
                    # Write prediction back so next step can use it as lag
                    last_known.loc[last_known.index[-1], 'y'] = pred
                    predictions.append((next_date, pred))

                # Revenue-per-unit for unit estimation
                cat_rev = group['y'].sum()
                cat_units = group['units_sold'].sum()
                rev_per_unit = cat_rev / cat_units if cat_units > 0 else 1.0

                # Distribute forecast across locations by historical share
                cat_locs = loc_shares[loc_shares['category_id'] == cat]
                for fdate, fpred in predictions:
                    for _, lrow in cat_locs.iterrows():
                        amt = max(0, round(fpred * lrow['share'], 2))
                        units = max(0, round(amt / rev_per_unit))
                        results.append({
                            'transaction_date': str(fdate.date()),
                            'category_id': int(cat),
                            'location_id': int(lrow['location_id']),
                            'amount': amt,
                            'units_sold': int(units),
                        })

            out_buf = io.StringIO()
            pd.DataFrame(results).to_csv(out_buf, index=False)
            encoded = base64.b64encode(out_buf.getvalue().encode()).decode()
            with open('/tmp/forecast-b64.txt', 'w') as f:
                f.write(encoded)
            print(f'XGBoost forecast complete: {len(results)} rows')
            PYEOF
            HORIZON="{{workflow.parameters.forecast-horizon-days}}" ACTUALS_B64="{{inputs.parameters.actuals-b64}}" python /tmp/run_forecast.py

    - name: write-forecast-results
      inputs:
        parameters:
          - name: tenant-id
          - name: forecast-b64
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            pip install -q psycopg2-binary pandas
            cat > /tmp/write.py << 'PYEOF'
            import psycopg2, pandas as pd, base64, io, os
            tenant_id = os.environ['TENANT_ID']
            db_url = os.environ['DB_URL']
            forecast_b64 = os.environ['FORECAST_B64']
            csv_data = base64.b64decode(forecast_b64.encode()).decode()
            df = pd.read_csv(io.StringIO(csv_data))
            conn = psycopg2.connect(db_url)
            cursor = conn.cursor()
            cursor.execute(
                'DELETE FROM fact_sales_daily '
                'WHERE tenant_id = %s AND is_forecast = true '
                'AND DATE_TRUNC(\'month\', transaction_date) NOT IN ('
                '  SELECT DISTINCT DATE_TRUNC(\'month\', transaction_date) '
                '  FROM fact_sales_daily '
                '  WHERE tenant_id = %s AND is_forecast = false'
                ')', (tenant_id, tenant_id))
            for _, row in df.iterrows():
                cursor.execute('INSERT INTO fact_sales_daily (transaction_date, tenant_id, category_id, location_id, amount, units_sold, is_forecast) VALUES (%s, %s, %s, %s, %s, %s, true)', (row['transaction_date'], tenant_id, int(row['category_id']), int(row['location_id']), float(row['amount']), int(row['units_sold'])))
            conn.commit()
            conn.close()
            print(f'Wrote {len(df)} forecast rows for tenant {tenant_id}')
            PYEOF
            TENANT_ID="{{inputs.parameters.tenant-id}}" FORECAST_B64="{{inputs.parameters.forecast-b64}}" python /tmp/write.py
        env:
          - name: DB_URL
            value: "{{workflow.parameters.db-url}}"

    - name: refresh-materialized-view
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            pip install -q psycopg2-binary
            python -c "
            import psycopg2, os
            conn = psycopg2.connect(os.environ['DB_URL'])
            conn.autocommit = True
            conn.cursor().execute('REFRESH MATERIALIZED VIEW CONCURRENTLY mv_final_sales_insights')
            conn.close()
            print('Materialized view refreshed')
            "
        env:
          - name: DB_URL
            value: "{{workflow.parameters.db-url}}"

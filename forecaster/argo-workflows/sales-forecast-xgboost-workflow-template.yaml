apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: sales-forecast-xgboost-workflow
  namespace: argo
spec:
  entrypoint: forecast-pipeline
  serviceAccountName: argo-workflow-sa
  arguments:
    parameters:
      - name: tenant-id
        value: ""
      - name: db-url
        value: "postgresql://postgres:postgres@host.minikube.internal:5432/salesanalyzer"
      - name: gateway-url
        value: "http://host.minikube.internal:8080"
      - name: forecast-horizon-days
        value: "30"
      - name: forecast-horizon
        value: "1m"
      - name: callback-url
        value: ""

  templates:
    - name: forecast-pipeline
      dag:
        tasks:
          - name: run-forecast
            template: run-xgboost-and-write
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
          - name: refresh-summary
            template: refresh-tenant-summary
            dependencies: [run-forecast]
            arguments:
              parameters:
                - name: tenant-id
                  value: "{{workflow.parameters.tenant-id}}"
          - name: notify-orchestrator
            template: notify-callback
            dependencies: [refresh-summary]
            when: "'{{workflow.parameters.callback-url}}' != ''"

    - name: run-xgboost-and-write
      inputs:
        parameters:
          - name: tenant-id
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            pip install -q psycopg2-binary xgboost pandas numpy scikit-learn
            cat > /tmp/run_forecast.py << 'PYEOF'
            import psycopg2, pandas as pd, numpy as np, csv, io, os
            from xgboost import XGBRegressor

            tenant_id = os.environ['TENANT_ID']
            db_url = os.environ['DB_URL']
            horizon = int(os.environ.get('HORIZON', '30'))
            horizon_type = os.environ.get('FORECAST_HORIZON', '1m')
            is_weekly = horizon_type.endswith('w')

            # ── Step 1: Extract actuals from DB ──
            conn = psycopg2.connect(db_url)
            cursor = conn.cursor()
            cursor.execute(
                'SELECT transaction_date, category_id, location_id, amount, units_sold '
                'FROM fact_sales_daily '
                'WHERE tenant_id = %s AND is_forecast = false '
                'ORDER BY transaction_date ASC',
                (tenant_id,)
            )
            buf = io.StringIO()
            writer = csv.writer(buf)
            writer.writerow(['ds', 'category_id', 'location_id', 'y', 'units_sold'])
            for row in cursor.fetchall():
                writer.writerow(row)
            conn.close()
            buf.seek(0)
            df = pd.read_csv(buf)
            df['ds'] = pd.to_datetime(df['ds'])
            print(f'Extracted {len(df)} actuals. Forecast horizon: {horizon} days ({horizon_type})')

            # ── Step 2: Run XGBoost forecast ──
            df_cat = df.groupby(['category_id', 'ds']).agg(
                y=('y', 'sum'), units_sold=('units_sold', 'sum')
            ).reset_index()
            global_max_date = df_cat['ds'].max()

            loc_shares = df.groupby(['category_id', 'location_id'])['y'].sum().reset_index()
            cat_totals = loc_shares.groupby('category_id')['y'].sum().reset_index().rename(columns={'y': 'cat_total'})
            loc_shares = loc_shares.merge(cat_totals, on='category_id')
            loc_shares['share'] = loc_shares['y'] / loc_shares['cat_total']

            def build_features(series_df):
                d = series_df.copy().sort_values('ds').reset_index(drop=True)
                d['day_of_week'] = d['ds'].dt.dayofweek
                d['day_of_month'] = d['ds'].dt.day
                d['month'] = d['ds'].dt.month
                d['week_of_year'] = d['ds'].dt.isocalendar().week.astype(int)
                d['day_ordinal'] = (d['ds'] - d['ds'].min()).dt.days
                for lag in [1, 7, 14, 30]:
                    d[f'lag_{lag}'] = d['y'].shift(lag)
                for win in [7, 14, 30]:
                    d[f'roll_mean_{win}'] = d['y'].shift(1).rolling(window=win, min_periods=1).mean()
                    d[f'roll_std_{win}'] = d['y'].shift(1).rolling(window=win, min_periods=1).std().fillna(0)
                return d

            FEATURE_COLS = [
                'day_of_week', 'day_of_month', 'month', 'week_of_year', 'day_ordinal',
                'lag_1', 'lag_7', 'lag_14', 'lag_30',
                'roll_mean_7', 'roll_std_7', 'roll_mean_14', 'roll_std_14',
                'roll_mean_30', 'roll_std_30',
            ]

            results = []
            for cat, group in df_cat.groupby('category_id'):
                if len(group) < 5:
                    continue
                featured = build_features(group)
                train = featured.dropna(subset=['lag_1']).copy()
                if len(train) < 3:
                    continue
                X_train = train[FEATURE_COLS].values
                y_train = train['y'].values
                model = XGBRegressor(
                    n_estimators=200, max_depth=4, learning_rate=0.1,
                    subsample=0.8, colsample_bytree=0.8,
                    objective='reg:squarederror', verbosity=0,
                )
                model.fit(X_train, y_train)
                last_known = featured.copy()
                predictions = []
                for step in range(horizon):
                    next_date = global_max_date + pd.Timedelta(days=step + 1)
                    new_row = pd.DataFrame({'ds': [next_date], 'y': [np.nan], 'units_sold': [0]})
                    last_known = pd.concat([last_known, new_row], ignore_index=True)
                    last_known = build_features(last_known[['ds', 'y', 'units_sold']])
                    row_feat = last_known.iloc[-1:]
                    X_pred = row_feat[FEATURE_COLS].fillna(0).values
                    pred = max(0, float(model.predict(X_pred)[0]))
                    last_known.loc[last_known.index[-1], 'y'] = pred
                    predictions.append((next_date, pred))
                cat_rev = group['y'].sum()
                cat_units = group['units_sold'].sum()
                rev_per_unit = cat_rev / cat_units if cat_units > 0 else 1.0
                cat_locs = loc_shares[loc_shares['category_id'] == cat]
                for fdate, fpred in predictions:
                    for _, lrow in cat_locs.iterrows():
                        amt = max(0, round(fpred * lrow['share'], 2))
                        units = max(0, round(amt / rev_per_unit))
                        results.append({
                            'transaction_date': str(fdate.date()),
                            'category_id': int(cat),
                            'location_id': int(lrow['location_id']),
                            'amount': amt,
                            'units_sold': int(units),
                        })
            print(f'XGBoost forecast complete: {len(results)} rows')

            # ── Step 3: Write results to DB ──
            result_df = pd.DataFrame(results)
            conn = psycopg2.connect(db_url)
            cursor = conn.cursor()
            if is_weekly:
                cursor.execute(
                    'DELETE FROM fact_sales_daily WHERE tenant_id = %s AND is_forecast = true',
                    (tenant_id,))
                print('Weekly: deleted all existing forecasts')
            else:
                new_months = set(pd.to_datetime(result_df['transaction_date']).dt.to_period('M').astype(str).unique())
                if new_months:
                    placeholders = ','.join(['%s'] * len(new_months))
                    month_dates = [m + '-01' for m in new_months]
                    cursor.execute(
                        f'DELETE FROM fact_sales_daily WHERE tenant_id = %s AND is_forecast = true '
                        f"AND DATE_TRUNC('month', transaction_date)::date IN ({placeholders})",
                        [tenant_id] + month_dates)
                    print(f'Month+: cleared {len(new_months)} overlapping forecast months')
            for _, row in result_df.iterrows():
                cursor.execute(
                    'INSERT INTO fact_sales_daily (transaction_date, tenant_id, category_id, location_id, amount, units_sold, is_forecast) '
                    'VALUES (%s, %s, %s, %s, %s, %s, true)',
                    (row['transaction_date'], tenant_id, int(row['category_id']), int(row['location_id']),
                     float(row['amount']), int(row['units_sold'])))
            conn.commit()
            conn.close()
            print(f'Wrote {len(result_df)} forecast rows to DB')
            PYEOF
            TENANT_ID="{{inputs.parameters.tenant-id}}" HORIZON="{{workflow.parameters.forecast-horizon-days}}" FORECAST_HORIZON="{{workflow.parameters.forecast-horizon}}" python /tmp/run_forecast.py
        env:
          - name: DB_URL
            value: "{{workflow.parameters.db-url}}"

    - name: notify-callback
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            pip install -q requests
            python -c "
            import requests, os
            callback_url = os.environ['CALLBACK_URL']
            if callback_url:
                resp = requests.post(callback_url, json={'status': 'COMPLETED'}, timeout=10)
                print(f'Callback sent to {callback_url}: {resp.status_code}')
            else:
                print('No callback URL — skipping')
            "
        env:
          - name: CALLBACK_URL
            value: "{{workflow.parameters.callback-url}}"

    - name: refresh-tenant-summary
      inputs:
        parameters:
          - name: tenant-id
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            pip install -q requests
            python -c "
            import requests, os
            gateway_url = os.environ['GATEWAY_URL']
            tenant_id = os.environ['TENANT_ID']
            url = f'{gateway_url}/api/insights/{tenant_id}/refresh'
            resp = requests.post(url, timeout=30)
            resp.raise_for_status()
            print(f'Summary refreshed for tenant {tenant_id}: {resp.status_code}')
            "
        env:
          - name: GATEWAY_URL
            value: "{{workflow.parameters.gateway-url}}"
          - name: TENANT_ID
            value: "{{inputs.parameters.tenant-id}}"
